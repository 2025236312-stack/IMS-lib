<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SmartLib Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            transition: all 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .login-card .card-body {
            padding: 2rem;
        }
        
        .login-card h3 {
            color: #1a1a2e;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .logo-icon-large {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .logo-icon-large i {
            font-size: 3rem;
            color: white;
        }
        
        .logo-section {
            text-align: center;
        }
        
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 280px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        @media (max-width: 768px) {
            .border-end-custom {
                border-right: none;
                border-bottom: 1px solid #dee2e6;
                padding-bottom: 1.5rem;
                margin-bottom: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card login-card">
        <div class="card-body">
            <h3 class="text-center">LOGIN</h3>
            <div class="row">
                <div class="col-md-6 border-end-custom">
                    <div class="logo-section">
                        <div class="logo-icon-large mx-auto">
                            <i class="bi bi-book-half"></i>
                        </div>
                        <h2>SmartLib</h2>
                        <p>Library Management System</p>
                        <div class="mt-3">
                            <small class="text-muted">
                                <i class="bi bi-shield-check"></i> Secure Access
                            </small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-envelope"></i> Email Address
                            </label>
                            <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="bi bi-lock"></i> Password
                            </label>
                            <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label small" for="rememberMe">
                                    Remember Me
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none small" style="color: #667eea;" onclick="showForgotPassword()">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn-login">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <small class="text-muted">
                            Don't have an account? 
                            <a href="#" class="text-decoration-none" style="color: #667eea;" onclick="showRegister()">Register here</a>
                        </small>
                    </div>
                    
                    <hr class="my-3">
                    
                    <div class="text-center">
                        <small class="text-muted">
                            <i class="bi bi-shield-check"></i> Demo: staff@library.com / staff123
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Register Modal -->
<div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-person-plus"></i> Create Account</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="regName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="regEmail" class="form-control" required>
                        <small id="regEmailAvailability" class="text-muted"></small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" id="regPassword" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="regConfirm" class="form-control" required>
                        <small id="regPasswordMatch" class="text-muted"></small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select id="regRole" class="form-select">
                            <option value="Student">🎓 Student</option>
                            <option value="Staff">👔 Staff</option>
                            <option value="Guest">🌐 Guest</option>
                        </select>
                    </div>
                    <div class="form-check mb-3">
                        <input type="checkbox" class="form-check-input" id="termsCheck">
                        <label class="form-check-label small">I agree to the Terms & Conditions</label>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal fade" id="forgotModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-warning">
                <h5 class="modal-title"><i class="bi bi-key"></i> Reset Password</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="forgotForm">
                    <div class="alert alert-info small">
                        <i class="bi bi-info-circle-fill"></i> Enter your registered email
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="fpEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" id="fpNewPassword" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="fpConfirm" class="form-control" required>
                        <small id="fpPasswordMatch" class="text-muted"></small>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Reset Password</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toastNotification" class="toast-notification" style="display: none;">
    <div class="toast bg-success text-white" role="alert">
        <div class="toast-body d-flex align-items-center justify-content-between">
            <span id="toastMessage">Message</span>
            <button type="button" class="btn-close btn-close-white" onclick="hideToast()"></button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Demo accounts
const demoAccounts = [
    { id: "STAFF001", fullname: "Staff User", email: "staff@library.com", password: "staff123", role: "Staff" },
    { id: "STU002", fullname: "Student User", email: "student@library.com", password: "student123", role: "Student" },
    { id: "GUEST003", fullname: "Guest User", email: "guest@library.com", password: "guest123", role: "Guest" }
];

let registeredUsers = [];

function loadUsers() {
    const stored = localStorage.getItem('smartlib_users');
    if (stored) {
        registeredUsers = JSON.parse(stored);
    }
}

function saveUsers() {
    localStorage.setItem('smartlib_users', JSON.stringify(registeredUsers));
}

function userExists(email) {
    return demoAccounts.some(u => u.email === email) || registeredUsers.some(u => u.email === email);
}

function authenticateUser(email, password) {
    const demoUser = demoAccounts.find(u => u.email === email && u.password === password);
    if (demoUser) return demoUser;
    const regUser = registeredUsers.find(u => u.email === email && u.password === password);
    return regUser || null;
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toastNotification');
    const toastMessage = document.getElementById('toastMessage');
    const toastDiv = toast.querySelector('.toast');
    
    toastDiv.className = `toast text-white bg-${type === 'success' ? 'success' : 'danger'}`;
    toastMessage.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle-fill' : 'exclamation-triangle-fill'} me-2"></i> ${message}`;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
}

function hideToast() {
    document.getElementById('toastNotification').style.display = 'none';
}

// Login - DIRECT REDIRECT
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const remember = document.getElementById('rememberMe').checked;
    
    const user = authenticateUser(email, password);
    
    if (user) {
        // Store in localStorage for persistence (not sessionStorage which can be cleared)
        localStorage.setItem('smartlib_logged_in', 'true');
        localStorage.setItem('smartlib_user_id', user.id);
        localStorage.setItem('smartlib_user_name', user.fullname);
        localStorage.setItem('smartlib_user_email', user.email);
        localStorage.setItem('smartlib_user_role', user.role);
        
        if (remember) {
            localStorage.setItem('smartlib_remember_email', email);
        } else {
            localStorage.removeItem('smartlib_remember_email');
        }
        
        showToast(`Welcome ${user.fullname}! Redirecting...`, 'success');
        
        // DIRECT REDIRECT - no delays that might fail
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 500);
    } else {
        showToast('Invalid email or password!', 'error');
    }
});

// Register
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const role = document.getElementById('regRole').value;
    const terms = document.getElementById('termsCheck').checked;
    
    if (!terms) {
        showToast('Please accept Terms & Conditions!', 'error');
        return;
    }
    
    if (password !== confirm) {
        showToast('Passwords do not match!', 'error');
        return;
    }
    
    if (userExists(email)) {
        showToast('Email already registered!', 'error');
        return;
    }
    
    const newUser = {
        id: 'USER' + Date.now(),
        fullname: name,
        email: email,
        password: password,
        role: role,
        registeredDate: new Date().toISOString()
    };
    
    registeredUsers.push(newUser);
    saveUsers();
    
    showToast('Registration successful! Please login.', 'success');
    
    const modal = bootstrap.Modal.getInstance(document.getElementById('registerModal'));
    modal.hide();
    
    document.getElementById('loginEmail').value = email;
    document.getElementById('registerForm').reset();
});

// Forgot password
document.getElementById('forgotForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('fpEmail').value.trim();
    const newPassword = document.getElementById('fpNewPassword').value;
    const confirm = document.getElementById('fpConfirm').value;
    
    if (newPassword !== confirm) {
        showToast('Passwords do not match!', 'error');
        return;
    }
    
    let found = false;
    for (let i = 0; i < registeredUsers.length; i++) {
        if (registeredUsers[i].email === email) {
            registeredUsers[i].password = newPassword;
            saveUsers();
            found = true;
            break;
        }
    }
    
    if (found) {
        showToast('Password reset successful!', 'success');
        const modal = bootstrap.Modal.getInstance(document.getElementById('forgotModal'));
        modal.hide();
        document.getElementById('loginEmail').value = email;
        document.getElementById('forgotForm').reset();
    } else if (demoAccounts.some(u => u.email === email)) {
        showToast('Demo account password cannot be changed!', 'error');
    } else {
        showToast('Email not found!', 'error');
    }
});

function showRegister() {
    new bootstrap.Modal(document.getElementById('registerModal')).show();
}

function showForgotPassword() {
    new bootstrap.Modal(document.getElementById('forgotModal')).show();
}

// Check email availability
document.getElementById('regEmail')?.addEventListener('input', function() {
    const email = this.value;
    const span = document.getElementById('regEmailAvailability');
    if (userExists(email)) {
        span.innerHTML = '<span class="text-danger">✗ Email taken</span>';
    } else if (email.includes('@')) {
        span.innerHTML = '<span class="text-success">✓ Available</span>';
    } else {
        span.innerHTML = '';
    }
});

// Password match check
document.getElementById('regConfirm')?.addEventListener('input', function() {
    const password = document.getElementById('regPassword').value;
    const confirm = this.value;
    const span = document.getElementById('regPasswordMatch');
    span.innerHTML = confirm ? (password === confirm ? '<span class="text-success">✓ Match</span>' : '<span class="text-danger">✗ No match</span>') : '';
});

document.getElementById('fpConfirm')?.addEventListener('input', function() {
    const password = document.getElementById('fpNewPassword').value;
    const confirm = this.value;
    const span = document.getElementById('fpPasswordMatch');
    span.innerHTML = confirm ? (password === confirm ? '<span class="text-success">✓ Match</span>' : '<span class="text-danger">✗ No match</span>') : '';
});

// Load remembered email
const rememberedEmail = localStorage.getItem('smartlib_remember_email');
if (rememberedEmail) {
    document.getElementById('loginEmail').value = rememberedEmail;
    document.getElementById('rememberMe').checked = true;
}

// Load users on startup
loadUsers();
</script>
</body>
</html>
