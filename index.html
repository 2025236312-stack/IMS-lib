<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SmartLib</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
        }
        .dashboard-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-logout {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border: none;
            border-radius: 12px;
            padding: 0.7rem 1.5rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
        }
        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
            color: white;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1rem;
            transition: all 0.3s;
        }
        .stat-box:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
        }
        .nav-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .nav-link-custom {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }
        .nav-link-custom:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="dashboard-card p-4">
                    <div class="text-center mb-4">
                        <div class="d-inline-block p-3 rounded-circle mb-3" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                            <i class="bi bi-person-fill text-white" style="font-size: 2rem;"></i>
                        </div>
                        <h2 class="text-white" id="welcomeName">Welcome back!</h2>
                        <p class="text-white-50">You have successfully logged in</p>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <div class="stat-box text-center">
                                <i class="bi bi-envelope-fill text-primary fs-4"></i>
                                <p class="text-white-50 small mt-2">Email</p>
                                <p class="text-white mb-0" id="userEmail">-</p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-box text-center">
                                <i class="bi bi-person-badge-fill text-success fs-4"></i>
                                <p class="text-white-50 small mt-2">Role</p>
                                <p class="text-white mb-0" id="userRole">-</p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-box text-center">
                                <i class="bi bi-clock-fill text-warning fs-4"></i>
                                <p class="text-white-50 small mt-2">Session</p>
                                <p class="text-white mb-0">30 minutes</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="nav-links">
                        <a href="books.html" class="nav-link-custom"><i class="bi bi-journal-bookmark-fill"></i> Books</a>
                        <a href="members.html" class="nav-link-custom"><i class="bi bi-people-fill"></i> Members</a>
                        <a href="transactions.html" class="nav-link-custom"><i class="bi bi-arrow-left-right"></i> Transactions</a>
                        <a href="insights.html" class="nav-link-custom"><i class="bi bi-graph-up"></i> Insights</a>
                    </div>
                    
                    <div class="text-center mt-4">
                        <button class="btn-logout" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // Check if user is logged in
    function checkLogin() {
        const isLoggedIn = sessionStorage.getItem('logged_in') === 'true';
        const userName = sessionStorage.getItem('user_name');
        
        if (!isLoggedIn || !userName) {
            window.location.href = 'index.html';
            return false;
        }
        return true;
    }
    
    // Load user data
    function loadUserData() {
        const userName = sessionStorage.getItem('user_name');
        const userEmail = sessionStorage.getItem('user_email');
        const userRole = sessionStorage.getItem('user_role');
        
        document.getElementById('welcomeName').innerHTML = `Welcome, ${userName || 'User'}!`;
        document.getElementById('userEmail').textContent = userEmail || '-';
        document.getElementById('userRole').textContent = userRole || '-';
    }
    
    // Logout function - CLEAR SESSION ONLY
    function logout() {
        sessionStorage.clear();
        localStorage.removeItem('remembered_user');
        window.location.href = 'index.html';
    }
    
    // Check session on page load
    if (!checkLogin()) {
        // Redirect already happens in checkLogin
    } else {
        loadUserData();
    }
    
    // Attach logout event
    document.getElementById('logoutBtn')?.addEventListener('click', function(e) {
        e.preventDefault();
        logout();
    });
    
    // Session timeout check (30 minutes)
    let lastActivity = sessionStorage.getItem('last_activity');
    if (lastActivity) {
        const now = Date.now();
        const inactiveTime = now - parseInt(lastActivity);
        if (inactiveTime > 30 * 60 * 1000) {
            logout();
        }
    }
    
    // Update last activity on user interaction
    function updateLastActivity() {
        sessionStorage.setItem('last_activity', Date.now().toString());
    }
    
    document.addEventListener('click', updateLastActivity);
    document.addEventListener('keypress', updateLastActivity);
    </script>
</body>
</html>
