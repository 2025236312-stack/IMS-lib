<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>4a Repository | Secure Login</title>
    
    <!-- Bootstrap 5 CSS (latest stable) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts: Saira Stencil & additional modern font for clean UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:wght@100..900&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        /* Custom Styles - fully self-contained (no external css file needed) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Vanta background container */
        #bg-vanta {
            position: relative;
            min-height: 100vh;
            width: 100%;
            background: #0a0f1c; /* fallback deep color */
        }
        
        /* Login card styling – glassmorphism / modern dark theme */
        .login-card {
            background: rgba(18, 22, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            width: 100%;
            max-width: 950px;
            transition: transform 0.3s ease;
            animation: fadeSlideUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        
        .login-card:hover {
            transform: translateY(-3px);
        }
        
        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card-body {
            padding: 2rem 2rem 2rem 2rem;
        }
        
        /* left side - logo / branding area */
        .brand-area {
            background: linear-gradient(135deg, rgba(30, 40, 60, 0.7), rgba(15, 20, 35, 0.5));
            border-radius: 24px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem 1rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        
        .repository-icon {
            font-size: 5rem;
            color: #4c9aff;
            filter: drop-shadow(0 4px 12px rgba(76, 154, 255, 0.4));
            margin-bottom: 1rem;
        }
        
        .brand-title {
            font-family: 'Saira Stencil', cursive;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #7aa9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        
        .brand-sub {
            font-size: 0.9rem;
            color: #b0c4ff;
            margin-top: 0.5rem;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 0.75rem;
            display: inline-block;
        }
        
        /* right side form styling */
        .form-label {
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #cfdfff;
            margin-bottom: 0.4rem;
        }
        
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        
        .form-control:focus {
            background: rgba(20, 25, 45, 0.9);
            border-color: #4c9aff;
            box-shadow: 0 0 0 4px rgba(76, 154, 255, 0.2);
            color: white;
            outline: none;
        }
        
        .form-control::placeholder {
            color: rgba(220, 230, 255, 0.5);
            font-size: 0.85rem;
        }
        
        .btn-login {
            background: linear-gradient(95deg, #3a7bd5, #0057b3);
            border: none;
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: white;
            width: 100%;
            margin-top: 1.2rem;
            transition: all 0.25s;
            box-shadow: 0 4px 12px rgba(0, 87, 179, 0.3);
        }
        
        .btn-login:hover {
            background: linear-gradient(95deg, #2b6bcb, #004299);
            transform: scale(1.01);
            box-shadow: 0 8px 20px rgba(0, 87, 179, 0.5);
        }
        
        /* additional link / demo helper */
        .demo-note {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1rem;
            color: #9aaed9;
        }
        
        .demo-note a {
            color: #8bb9fe;
            text-decoration: none;
        }
        
        /* Responsive adjustments */
        @media (max-width: 768px) {
            .login-card {
                max-width: 92%;
                margin: 0 1rem;
            }
            .card-body {
                padding: 1.5rem;
            }
            .brand-area {
                margin-bottom: 1rem;
                padding: 1.5rem 1rem;
            }
            .brand-title {
                font-size: 1.8rem;
            }
            .repository-icon {
                font-size: 3.5rem;
            }
        }
        
        /* input icons and little touches */
        .input-group-icon {
            position: relative;
        }
        
        /* Smooth vanta canvas overlay fix - ensure it covers properly */
        canvas {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        #bg-vanta {
            position: relative;
            z-index: 1;
        }
        
        .d-flex {
            position: relative;
            z-index: 2;
        }
        
        /* custom eye candy for form */
        .input-icon-inside {
            position: relative;
        }
        
        .input-icon-inside i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #7e95c9;
            font-size: 1.1rem;
            pointer-events: none;
        }
        
        .form-control.pe-4 {
            padding-right: 2.5rem;
        }
    </style>
</head>
<body id="bg-vanta">

    <!-- Login Form Container - centered with flex -->
    <div class="d-flex justify-content-center align-items-center vh-100 px-3 px-md-4">
        <div class="card login-card border-0">
            <div class="card-body">
                <div class="row g-4 align-items-stretch">
                    <!-- Left Column: Branding / Logo Area (replaces "Image/Logo>" placeholder) -->
                    <div class="col-md-6 d-flex">
                        <div class="brand-area w-100">
                            <i class="bi bi-folder-symlink repository-icon"></i>
                            <div class="brand-title">4a Repository</div>
                            <div class="brand-sub">
                                <i class="bi bi-database"></i> Asset Hub • Secure Access
                            </div>
                            <div class="mt-3">
                                <span class="badge bg-light text-dark bg-opacity-25 px-3 py-2 rounded-pill">
                                    <i class="bi bi-shield-check"></i> Enterprise Grade
                                </span>
                            </div>
                            <div class="mt-4 small text-white-50">
                                <i class="bi bi-cloud-check"></i> Repository v4.0
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right Column: Form inputs -->
                    <div class="col-md-6">
                        <h3 class="text-center mb-4" style="color: #f0f3ff; font-weight: 600;">
                            <i class="bi bi-box-arrow-in-right"></i> ACCESS PORTAL
                        </h3>
                        
                        <!-- Email field with icon hint -->
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label">
                                <i class="bi bi-envelope-fill me-1"></i> Email Address
                            </label>
                            <div class="input-icon-inside">
                                <input type="email" class="form-control pe-4" id="loginEmail" placeholder="admin@4a-repo.com" autocomplete="email">
                                <i class="bi bi-envelope"></i>
                            </div>
                        </div>
                        
                        <!-- Password field -->
                        <div class="mb-3">
                            <label for="loginPassword" class="form-label">
                                <i class="bi bi-lock-fill me-1"></i> Password
                            </label>
                            <div class="input-icon-inside">
                                <input type="password" class="form-control pe-4" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                                <i class="bi bi-key"></i>
                            </div>
                        </div>
                        
                        <!-- Login button (links to dashboard.php as per original) -->
                        <a href="dashboard.php" class="btn btn-login" id="loginBtn">
                            <i class="bi bi-arrow-right-circle-fill me-2"></i>LOGIN & ACCESS
                        </a>
                        
                        <!-- Demo helper text (just for UX, no actual validation) -->
                        <div class="demo-note mt-3">
                            <i class="bi bi-info-circle-fill"></i> Demo: click Login → dashboard.php (mock)
                            <br><span class="opacity-75">Credentials not stored | interactive background</span>
                        </div>
                        
                        <!-- optional extra micro interaction / "forgot" row -->
                        <div class="d-flex justify-content-between mt-3 small">
                            <span class="text-light opacity-50"><i class="bi bi-fingerprint"></i> SSO ready</span>
                            <span class="text-light opacity-50"><i class="bi bi-question-circle"></i> Forgot password?</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <!-- Three.js required for Vanta effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    
    <!-- Vanta.js NET effect (modern, interactive) -->
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    
    <script>
        // Initialize Vanta.NET with custom settings & robust error handling
        (function initVanta() {
            if (typeof VANTA !== 'undefined' && typeof THREE !== 'undefined') {
                try {
                    VANTA.NET({
                        el: "#bg-vanta",
                        mouseControls: true,
                        touchControls: true,
                        gyroControls: false,
                        minHeight: 200.00,
                        minWidth: 200.00,
                        scale: 1.00,
                        scaleMobile: 1.00,
                        color: 0x3a7bd5,      // accent blue matching gradient
                        backgroundColor: 0x0a0f1c,
                        points: 12.0,
                        maxDistance: 22.0,
                        spacing: 16.0
                    });
                } catch (error) {
                    console.warn("Vanta initialization error:", error);
                    // graceful fallback: just set a solid background style
                    document.getElementById("bg-vanta").style.background = "#0a0f1c radial-gradient(circle at 20% 40%, #14213d, #04070f)";
                }
            } else {
                console.warn("THREE or VANTA not loaded yet, applying fallback");
                document.getElementById("bg-vanta").style.background = "#0a0f1c";
                // retry after a short delay, sometimes cdn races
                setTimeout(() => {
                    if (typeof VANTA !== 'undefined' && typeof THREE !== 'undefined') {
                        VANTA.NET({
                            el: "#bg-vanta",
                            mouseControls: true,
                            touchControls: true,
                            gyroControls: false,
                            minHeight: 200.00,
                            minWidth: 200.00,
                            scale: 1.00,
                            scaleMobile: 1.00,
                            color: 0x3a7bd5,
                            backgroundColor: 0x0a0f1c,
                        });
                    }
                }, 300);
            }
        })();
        
        // Optional: small interactive feedback for login button to respect original dashboard.php link
        // Additionally, we can display a console tip - no interference with href.
        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn) {
            loginBtn.addEventListener('click', function(e) {
                const emailInput = document.getElementById('loginEmail');
                const pwdInput = document.getElementById('loginPassword');
                // Simple front-end "demo" note: not blocking navigation; just provide console feedback for fun
                if (emailInput && emailInput.value.trim() === "") {
                    console.log("4a Repository: login attempt with empty email (demo mode)");
                } else {
                    console.log(`Login simulation: ${emailInput?.value || "guest"} -> redirecting to dashboard.php`);
                }
                // no preventDefault – href will redirect to dashboard.php as original design.
                // However, to make the experience complete in a static environment,
                // if the dashboard.php does not exist, the browser shows 404. But that matches the original spec.
                // We also preserve the anchor default behavior.
            });
        }
        
        // Add some dynamic placeholder animation (just aesthetic)
        const emailField = document.getElementById('loginEmail');
        const pwdField = document.getElementById('loginPassword');
        if (emailField) {
            emailField.placeholder = "developer@4a.io";
        }
        if (pwdField) {
            pwdField.placeholder = "••••••••";
        }
    </script>
    <!-- ensure any leftover closing tags harmony -->
</body>
</html>
