<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLib | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:wght@100..900&family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #bg-vanta { position: relative; min-height: 100vh; width: 100%; background: #0a0f1c; }
        .login-card { background: rgba(18, 22, 35, 0.85); backdrop-filter: blur(12px); border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3); width: 100%; max-width: 950px; animation: fadeSlideUp 0.6s ease; }
        @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .card-body { padding: 2rem; }
        .brand-area { background: linear-gradient(135deg, rgba(30, 40, 60, 0.7), rgba(15, 20, 35, 0.5)); border-radius: 24px; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem 1rem; border: 1px solid rgba(255,255,255,0.1); }
        .repository-icon { font-size: 5rem; color: #4c9aff; margin-bottom: 1rem; }
        .brand-title { font-family: 'Saira Stencil', cursive; font-size: 2.2rem; background: linear-gradient(135deg, #FFFFFF, #7aa9ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .form-label { font-weight: 500; font-size: 0.85rem; text-transform: uppercase; color: #cfdfff; }
        .form-control { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 16px; padding: 0.75rem 1rem; color: white; }
        .form-control:focus { background: rgba(20, 25, 45, 0.9); border-color: #4c9aff; outline: none; color: white; }
        .btn-login { background: linear-gradient(95deg, #3a7bd5, #0057b3); border: none; border-radius: 40px; padding: 0.7rem 1.5rem; font-weight: 600; color: white; width: 100%; margin-top: 1.2rem; cursor: pointer; }
        .btn-login:hover { transform: scale(1.01); }
        canvas { position: fixed !important; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        #bg-vanta, .d-flex { position: relative; z-index: 2; }
        .input-icon-inside { position: relative; }
        .input-icon-inside i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #7e95c9; }
        
        /* Modal custom styling - matches login card design */
        .modal-glass {
            background: rgba(18, 22, 35, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 32px;
        }
        .modal-glass .modal-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem 1.5rem 0.75rem 1.5rem;
        }
        .modal-glass .modal-body {
            padding: 1.5rem;
        }
        .modal-glass .modal-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 1.5rem 1.5rem 1.5rem;
        }
        .modal-glass .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
        }
        .modal-glass .form-control:focus {
            background: rgba(20, 25, 45, 0.9);
            border-color: #4c9aff;
        }
        .modal-glass .form-label {
            color: #cfdfff;
            font-size: 0.75rem;
        }
        .modal-glass .btn-close-white {
            filter: brightness(0) invert(1);
        }
        .link-glass {
            color: #7aa9ff;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
            cursor: pointer;
        }
        .link-glass:hover {
            color: #4c9aff;
            text-decoration: underline;
        }
        .divider-glass {
            display: flex;
            align-items: center;
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            margin: 0.5rem 0;
        }
        .divider-glass::before,
        .divider-glass::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .divider-glass::before {
            margin-right: 0.5rem;
        }
        .divider-glass::after {
            margin-left: 0.5rem;
        }
        .toast-custom {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 10000;
            display: none;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .toast-custom.show {
            display: flex;
            animation: fadeInOut 2.5s ease;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; bottom: 0; }
            15% { opacity: 1; bottom: 30px; }
            85% { opacity: 1; bottom: 30px; }
            100% { opacity: 0; bottom: 0; }
        }
        @media (max-width: 768px) {
            .toast-custom { white-space: normal; text-align: center; max-width: 90%; font-size: 11px; }
        }
        .password-strength {
            height: 3px;
            margin-top: 5px;
            border-radius: 3px;
            transition: all 0.2s;
        }
        .strength-weak { background: #dc3545; width: 33%; }
        .strength-medium { background: #ffc107; width: 66%; }
        .strength-strong { background: #28a745; width: 100%; }
    </style>
</head>
<body id="bg-vanta">

<script>
    // Clear any stale session data on login page load
    localStorage.removeItem('logged_in');
    localStorage.removeItem('username');
    localStorage.removeItem('user_email');
    localStorage.removeItem('user_role');
    sessionStorage.clear();
    console.log('Login page ready - session cleared');
</script>

    <div class="d-flex justify-content-center align-items-center vh-100 px-3">
        <div class="card login-card border-0">
            <div class="card-body">
                <div class="row g-4">
                    <div class="col-md-6 d-flex">
                        <div class="brand-area w-100">
                            <i class="bi bi-folder-symlink repository-icon"></i>
                            <div class="brand-title">4a Repository</div>
                            <div class="brand-sub text-white-50 mt-2"><i class="bi bi-database"></i> Secure Access</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h3 class="text-center mb-4 text-white">ACCESS PORTAL</h3>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <div class="input-icon-inside">
                                <input type="email" class="form-control" id="loginEmail" placeholder="admin@4a-repo.com">
                                <i class="bi bi-envelope"></i>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-icon-inside">
                                <input type="password" class="form-control" id="loginPassword" placeholder="••••••••">
                                <i class="bi bi-key"></i>
                            </div>
                        </div>
                        <button class="btn btn-login" id="loginBtn">LOGIN & ACCESS</button>
                        
                        <!-- Register & Forgot Password Links -->
                        <div class="divider-glass mt-3">or</div>
                        <div class="d-flex justify-content-between mt-2">
                            <span class="link-glass" onclick="openRegisterModal()">
                                <i class="bi bi-person-plus"></i> Create Account
                            </span>
                            <span class="link-glass" onclick="openForgotModal()">
                                <i class="bi bi-question-circle"></i> Forgot Password?
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- REGISTER MODAL -->
    <!-- ============================================ -->
    <div class="modal fade" id="registerModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-glass">
                <div class="modal-header">
                    <h5 class="modal-title text-white"><i class="bi bi-person-plus"></i> Create New Account</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="registerForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="regFullname" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="regEmail" placeholder="user@example.com" required>
                            <small class="text-muted" id="emailCheckMsg" style="font-size: 11px;"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="regPassword" placeholder="••••••••" required>
                            <div class="password-strength" id="regPwStrength"></div>
                            <small class="text-muted" style="font-size: 10px;">Min. 8 characters with letters & numbers</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="regConfirmPassword" placeholder="••••••••" required>
                            <div class="small" id="regPwMatch"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select class="form-select" id="regRole">
                                <option value="Student">📘 Student</option>
                                <option value="Staff">👔 Staff</option>
                                <option value="Guest">🌟 Guest</option>
                            </select>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termsCheck" required>
                            <label class="form-check-label text-white-50 small">
                                I agree to the <span class="link-glass" style="font-size: inherit;">Terms & Conditions</span>
                            </label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- FORGOT PASSWORD MODAL -->
    <!-- ============================================ -->
    <div class="modal fade" id="forgotModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-glass">
                <div class="modal-header">
                    <h5 class="modal-title text-white"><i class="bi bi-key"></i> Reset Password</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="forgotForm">
                    <div class="modal-body">
                        <p class="text-white-50 small mb-3">Enter your email address and we'll help you reset your password.</p>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="forgotEmail" placeholder="user@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" class="form-control" id="forgotNewPassword" placeholder="••••••••" required>
                            <div class="password-strength" id="forgotPwStrength"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" id="forgotConfirmPassword" placeholder="••••••••" required>
                            <div class="small" id="forgotPwMatch"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-warning">Reset Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Message -->
    <div id="toastMsg" class="toast-custom">
        <i class="bi bi-info-circle-fill"></i>
        <span id="toastText">Message</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
        // ============================================
        // VANTA BACKGROUND
        // ============================================
        VANTA.NET({ el: "#bg-vanta", mouseControls: true, touchControls: true, color: 0x3a7bd5, backgroundColor: 0x0a0f1c });
        
        // ============================================
        // TOAST FUNCTION
        // ============================================
        function showToast(message, isError = false) {
            const toast = document.getElementById('toastMsg');
            const toastText = document.getElementById('toastText');
            toastText.textContent = message;
            toast.style.background = isError ? 'rgba(220, 53, 69, 0.9)' : 'rgba(40, 167, 69, 0.9)';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
                toast.style.background = 'rgba(0,0,0,0.85)';
            }, 2500);
        }
        
        // ============================================
        // STORAGE KEYS FOR USERS
        // ============================================
        const USERS_STORAGE_KEY = 'smartlib_registered_users';
        const DEMO_ACCOUNTS = [
            { email: "staff@library.com", password: "staff123", role: "Staff", name: "Staff User" },
            { email: "student@library.com", password: "student123", role: "Student", name: "Student User" },
            { email: "guest@library.com", password: "guest123", role: "Guest", name: "Guest User" }
        ];
        
        function loadUsers() {
            const usersJson = localStorage.getItem(USERS_STORAGE_KEY);
            if (usersJson) {
                try {
                    const users = JSON.parse(usersJson);
                    return Array.isArray(users) ? users : [];
                } catch(e) { return []; }
            }
            return [];
        }
        
        function saveUsers(users) {
            localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(users));
        }
        
        function emailExists(email) {
            if (!email) return false;
            const normalizedEmail = email.trim().toLowerCase();
            if (DEMO_ACCOUNTS.some(acc => acc.email.toLowerCase() === normalizedEmail)) return true;
            const users = loadUsers();
            return users.some(user => user.email && user.email.toLowerCase() === normalizedEmail);
        }
        
        function hashPassword(password) {
            // Simple hash simulation for demo
            let hash = 0;
            for (let i = 0; i < password.length; i++) {
                hash = ((hash << 5) - hash) + password.charCodeAt(i);
                hash |= 0;
            }
            return 'hashed_' + Math.abs(hash).toString(36) + '_' + password.length;
        }
        
        function registerUser(fullname, email, password, role) {
            if (!fullname || fullname.trim().length < 2) {
                return { success: false, message: 'Full name must be at least 2 characters' };
            }
            if (!email || !email.includes('@')) {
                return { success: false, message: 'Valid email required' };
            }
            if (emailExists(email)) {
                return { success: false, message: 'Email already registered' };
            }
            if (!password || password.length < 8) {
                return { success: false, message: 'Password must be at least 8 characters' };
            }
            
            const users = loadUsers();
            const newUser = {
                id: 'U' + String(users.length + 1).padStart(4, '0'),
                fullname: fullname.trim(),
                email: email.trim().toLowerCase(),
                password: hashPassword(password),
                role: role || 'Student',
                created_at: new Date().toISOString(),
                status: 'active'
            };
            users.push(newUser);
            saveUsers(users);
            return { success: true, message: 'Registration successful! You can now login.' };
        }
        
        function resetPassword(email, newPassword, confirmPassword) {
            if (!email || email.trim() === '') {
                return { success: false, message: 'Email is required' };
            }
            if (!newPassword || newPassword.length < 8) {
                return { success: false, message: 'Password must be at least 8 characters' };
            }
            if (newPassword !== confirmPassword) {
                return { success: false, message: 'Passwords do not match' };
            }
            
            const normalizedEmail = email.trim().toLowerCase();
            // Check demo accounts - cannot reset demo passwords
            if (DEMO_ACCOUNTS.some(acc => acc.email.toLowerCase() === normalizedEmail)) {
                return { success: false, message: 'Demo accounts cannot reset password. Use demo credentials.' };
            }
            
            const users = loadUsers();
            const userIndex = users.findIndex(u => u.email.toLowerCase() === normalizedEmail);
            if (userIndex === -1) {
                return { success: false, message: 'Email not found in our records' };
            }
            
            users[userIndex].password = hashPassword(newPassword);
            users[userIndex].updated_at = new Date().toISOString();
            saveUsers(users);
            return { success: true, message: 'Password reset successful! You can now login.' };
        }
        
        function validateLogin(email, password) {
            const normalizedEmail = email.trim().toLowerCase();
            // Check demo accounts
            const demoUser = DEMO_ACCOUNTS.find(acc => acc.email.toLowerCase() === normalizedEmail);
            if (demoUser && password === demoUser.password) {
                return { success: true, user: { name: demoUser.name, email: demoUser.email, role: demoUser.role } };
            }
            // Check registered users
            const users = loadUsers();
            const user = users.find(u => u.email.toLowerCase() === normalizedEmail);
            if (user && user.password === hashPassword(password)) {
                return { success: true, user: { name: user.fullname, email: user.email, role: user.role } };
            }
            return { success: false, message: 'Invalid email or password' };
        }
        
        // ============================================
        // LOGIN BUTTON
        // ============================================
        document.getElementById('loginBtn').addEventListener('click', function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showToast('Please enter email and password', true);
                return;
            }
            
            const result = validateLogin(email, password);
            if (result.success) {
                localStorage.setItem('logged_in', 'true');
                localStorage.setItem('username', result.user.name);
                localStorage.setItem('user_email', result.user.email);
                localStorage.setItem('user_role', result.user.role);
                showToast(`Welcome, ${result.user.name}! Redirecting...`);
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            } else {
                showToast(result.message || 'Login failed', true);
            }
        });
        
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        
        // ============================================
        // REGISTER MODAL FUNCTIONS
        // ============================================
        function openRegisterModal() {
            const modal = new bootstrap.Modal(document.getElementById('registerModal'));
            document.getElementById('registerForm').reset();
            document.getElementById('regPwStrength').innerHTML = '';
            document.getElementById('regPwMatch').innerHTML = '';
            document.getElementById('emailCheckMsg').innerHTML = '';
            modal.show();
        }
        
        // Email availability check (real-time)
        const regEmailInput = document.getElementById('regEmail');
        if (regEmailInput) {
            regEmailInput.addEventListener('input', function() {
                const email = this.value.trim();
                const msgSpan = document.getElementById('emailCheckMsg');
                if (email && email.includes('@')) {
                    if (emailExists(email)) {
                        msgSpan.innerHTML = '<span class="text-danger">❌ Email already taken</span>';
                    } else {
                        msgSpan.innerHTML = '<span class="text-success">✅ Email available</span>';
                    }
                } else {
                    msgSpan.innerHTML = '';
                }
            });
        }
        
        // Password strength meter
        const regPassword = document.getElementById('regPassword');
        if (regPassword) {
            regPassword.addEventListener('input', function() {
                const pwd = this.value;
                const strengthDiv = document.getElementById('regPwStrength');
                let strength = 0;
                if (pwd.length >= 8) strength++;
                if (pwd.match(/[a-z]/) && pwd.match(/[A-Z]/)) strength++;
                if (pwd.match(/\d/)) strength++;
                if (pwd.match(/[^a-zA-Z\d]/)) strength++;
                
                if (pwd.length === 0) {
                    strengthDiv.innerHTML = '';
                } else if (strength <= 1) {
                    strengthDiv.innerHTML = '<div class="password-strength strength-weak"></div><small class="text-muted">Weak</small>';
                } else if (strength === 2) {
                    strengthDiv.innerHTML = '<div class="password-strength strength-medium"></div><small class="text-muted">Medium</small>';
                } else {
                    strengthDiv.innerHTML = '<div class="password-strength strength-strong"></div><small class="text-muted">Strong</small>';
                }
            });
        }
        
        // Confirm password match
        const regConfirm = document.getElementById('regConfirmPassword');
        if (regConfirm) {
            regConfirm.addEventListener('input', function() {
                const pwd = document.getElementById('regPassword').value;
                const confirm = this.value;
                const matchDiv = document.getElementById('regPwMatch');
                if (confirm.length === 0) {
                    matchDiv.innerHTML = '';
                } else if (pwd === confirm) {
                    matchDiv.innerHTML = '<span class="text-success"><i class="bi bi-check-circle"></i> Passwords match</span>';
                } else {
                    matchDiv.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Passwords do not match</span>';
                }
            });
        }
        
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fullname = document.getElementById('regFullname').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const role = document.getElementById('regRole').value;
            const terms = document.getElementById('termsCheck').checked;
            
            if (!terms) {
                showToast('Please accept Terms & Conditions', true);
                return;
            }
            if (password !== confirm) {
                showToast('Passwords do not match', true);
                return;
            }
            
            const result = registerUser(fullname, email, password, role);
            if (result.success) {
                bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
                showToast(result.message);
                // Pre-fill email in login form
                document.getElementById('loginEmail').value = email;
                document.getElementById('loginPassword').value = '';
            } else {
                showToast(result.message, true);
            }
        });
        
        // ============================================
        // FORGOT PASSWORD MODAL FUNCTIONS
        // ============================================
        function openForgotModal() {
            const modal = new bootstrap.Modal(document.getElementById('forgotModal'));
            document.getElementById('forgotForm').reset();
            document.getElementById('forgotPwStrength').innerHTML = '';
            document.getElementById('forgotPwMatch').innerHTML = '';
            modal.show();
        }
        
        const forgotPassword = document.getElementById('forgotNewPassword');
        if (forgotPassword) {
            forgotPassword.addEventListener('input', function() {
                const pwd = this.value;
                const strengthDiv = document.getElementById('forgotPwStrength');
                let strength = 0;
                if (pwd.length >= 8) strength++;
                if (pwd.match(/[a-z]/) && pwd.match(/[A-Z]/)) strength++;
                if (pwd.match(/\d/)) strength++;
                if (pwd.match(/[^a-zA-Z\d]/)) strength++;
                
                if (pwd.length === 0) {
                    strengthDiv.innerHTML = '';
                } else if (strength <= 1) {
                    strengthDiv.innerHTML = '<div class="password-strength strength-weak"></div><small class="text-muted">Weak</small>';
                } else if (strength === 2) {
                    strengthDiv.innerHTML = '<div class="password-strength strength-medium"></div><small class="text-muted">Medium</small>';
                } else {
                    strengthDiv.innerHTML = '<div class="password-strength strength-strong"></div><small class="text-muted">Strong</small>';
                }
            });
        }
        
        const forgotConfirm = document.getElementById('forgotConfirmPassword');
        if (forgotConfirm) {
            forgotConfirm.addEventListener('input', function() {
                const pwd = document.getElementById('forgotNewPassword').value;
                const confirm = this.value;
                const matchDiv = document.getElementById('forgotPwMatch');
                if (confirm.length === 0) {
                    matchDiv.innerHTML = '';
                } else if (pwd === confirm) {
                    matchDiv.innerHTML = '<span class="text-success"><i class="bi bi-check-circle"></i> Passwords match</span>';
                } else {
                    matchDiv.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle"></i> Passwords do not match</span>';
                }
            });
        }
        
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value;
            const newPassword = document.getElementById('forgotNewPassword').value;
            const confirmPassword = document.getElementById('forgotConfirmPassword').value;
            
            const result = resetPassword(email, newPassword, confirmPassword);
            if (result.success) {
                bootstrap.Modal.getInstance(document.getElementById('forgotModal')).hide();
                showToast(result.message);
                document.getElementById('loginEmail').value = email;
                document.getElementById('loginPassword').value = '';
            } else {
                showToast(result.message, true);
            }
        });
        
        // Make functions globally accessible for onclick
        window.openRegisterModal = openRegisterModal;
        window.openForgotModal = openForgotModal;
        
        console.log('Login page with Register & Forgot Password ready');
    </script>
</body>
</html>
