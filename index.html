<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SmartLib - Library Management System Login</title>
    
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <!-- Google Font API -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Saira+Stencil:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-card {
            background: rgba(15, 25, 45, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .login-card .card-body {
            padding: 2rem;
        }
        
        .login-card h3 {
            color: white;
            font-family: 'Saira Stencil', cursive;
            margin-bottom: 1.5rem;
        }
        
        .login-card .form-label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
        }
        
        .login-card .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
            padding: 10px 12px;
        }
        
        .login-card .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #667eea;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
        }
        
        .logo-icon-large {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .logo-icon-large i {
            font-size: 4rem;
            color: white;
        }
        
        .logo-section h2 {
            color: white;
            font-family: 'Saira Stencil', cursive;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8">
                <div class="card login-card">
                    <div class="card-body">
                        <h3 class="text-center">SMARTLIB LOGIN</h3>
                        <div class="row">
                            <div class="col-md-6 text-center border-end border-white">
                                <div class="logo-section py-4">
                                    <div class="logo-icon-large mx-auto">
                                        <i class="bi bi-book-half"></i>
                                    </div>
                                    <h2 class="mt-3">SmartLib</h2>
                                    <p>Library Management System</p>
                                    <small class="text-white-50">Secure Access</small>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label class="form-label">Email Address</label>
                                        <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Password</label>
                                        <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
                                    </div>
                                    <button type="submit" class="btn-login">
                                        <i class="bi bi-box-arrow-in-right"></i> Login
                                    </button>
                                </form>
                                <hr class="bg-white">
                                <div class="text-center">
                                    <small class="text-white-50">
                                        <i class="bi bi-shield-check"></i> Secure Login
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Demo accounts
        const demoAccounts = [
            { id: "STAFF001", fullname: "Staff User", email: "staff@library.com", password: "staff123", role: "Staff" },
            { id: "STU002", fullname: "Student User", email: "student@library.com", password: "student123", role: "Student" },
            { id: "GUEST003", fullname: "Guest User", email: "guest@library.com", password: "guest123", role: "Guest" }
        ];

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const user = demoAccounts.find(u => u.email === email && u.password === password);
            
            if (user) {
                // Store session data - THIS IS WHAT YOUR DASHBOARD LOOKS FOR
                sessionStorage.clear();
                sessionStorage.setItem('logged_in', 'true');
                sessionStorage.setItem('user_id', user.id);
                sessionStorage.setItem('user_name', user.fullname);
                sessionStorage.setItem('user_email', user.email);
                sessionStorage.setItem('user_role', user.role);
                sessionStorage.setItem('last_activity', new Date().toISOString());
                
                // Also store in localStorage as backup
                localStorage.setItem('library_logged_in', 'true');
                localStorage.setItem('library_user_name', user.fullname);
                localStorage.setItem('library_user_email', user.email);
                localStorage.setItem('library_user_role', user.role);
                
                alert(`Welcome ${user.fullname}! Redirecting to dashboard...`);
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid email or password!\n\nDemo accounts:\nstaff@library.com / staff123\nstudent@library.com / student123\nguest@library.com / guest123');
            }
        });
    </script>
</body>
</html>
