<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLib | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Saira+Stencil:wght@100..900&family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #bg-vanta { position: relative; min-height: 100vh; width: 100%; background: #0a0f1c; }
        .login-card { background: rgba(18, 22, 35, 0.85); backdrop-filter: blur(12px); border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3); width: 100%; max-width: 950px; animation: fadeSlideUp 0.6s ease; }
        @keyframes fadeSlideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .card-body { padding: 2rem; }
        .brand-area { background: linear-gradient(135deg, rgba(30, 40, 60, 0.7), rgba(15, 20, 35, 0.5)); border-radius: 24px; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem 1rem; border: 1px solid rgba(255,255,255,0.1); }
        .repository-icon { font-size: 5rem; color: #4c9aff; filter: drop-shadow(0 4px 12px rgba(76, 154, 255, 0.4)); margin-bottom: 1rem; }
        .brand-title { font-family: 'Saira Stencil', cursive; font-size: 2.2rem; font-weight: 700; background: linear-gradient(135deg, #FFFFFF, #7aa9ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .brand-sub { font-size: 0.9rem; color: #b0c4ff; margin-top: 0.5rem; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 0.75rem; display: inline-block; }
        .form-label { font-weight: 500; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: #cfdfff; margin-bottom: 0.4rem; }
        .form-control { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.25); border-radius: 16px; padding: 0.75rem 1rem; color: white; font-size: 0.95rem; transition: all 0.2s; }
        .form-control:focus { background: rgba(20, 25, 45, 0.9); border-color: #4c9aff; box-shadow: 0 0 0 4px rgba(76, 154, 255, 0.2); color: white; outline: none; }
        .btn-login { background: linear-gradient(95deg, #3a7bd5, #0057b3); border: none; border-radius: 40px; padding: 0.7rem 1.5rem; font-weight: 600; color: white; width: 100%; margin-top: 1.2rem; cursor: pointer; }
        .btn-login:hover { background: linear-gradient(95deg, #2b6bcb, #004299); transform: scale(1.01); }
        canvas { position: fixed !important; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        #bg-vanta { position: relative; z-index: 1; }
        .d-flex { position: relative; z-index: 2; }
        .demo-note { font-size: 0.7rem; text-align: center; margin-top: 1rem; color: #9aaed9; }
        .input-icon-inside { position: relative; }
        .input-icon-inside i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #7e95c9; pointer-events: none; }
        @media (max-width: 768px) { .login-card { max-width: 92%; } .brand-title { font-size: 1.8rem; } }
    </style>
</head>
<body id="bg-vanta">

<script>
    // DO NOT clear localStorage here - only clear on actual logout!
    // This was causing the loop!
    console.log('Login page loaded - checking for existing session');
</script>

    <div class="d-flex justify-content-center align-items-center vh-100 px-3 px-md-4">
        <div class="card login-card border-0">
            <div class="card-body">
                <div class="row g-4 align-items-stretch">
                    <div class="col-md-6 d-flex">
                        <div class="brand-area w-100">
                            <i class="bi bi-folder-symlink repository-icon"></i>
                            <div class="brand-title">4a Repository</div>
                            <div class="brand-sub"><i class="bi bi-database"></i> Asset Hub • Secure Access</div>
                            <div class="mt-3"><span class="badge bg-light text-dark bg-opacity-25 px-3 py-2 rounded-pill"><i class="bi bi-shield-check"></i> Enterprise Grade</span></div>
                            <div class="mt-4 small text-white-50"><i class="bi bi-cloud-check"></i> Repository v4.0</div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h3 class="text-center mb-4" style="color: #f0f3ff;"><i class="bi bi-box-arrow-in-right"></i> ACCESS PORTAL</h3>
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-envelope-fill me-1"></i> Email Address</label>
                            <div class="input-icon-inside">
                                <input type="email" class="form-control pe-4" id="loginEmail" placeholder="admin@4a-repo.com">
                                <i class="bi bi-envelope"></i>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-lock-fill me-1"></i> Password</label>
                            <div class="input-icon-inside">
                                <input type="password" class="form-control pe-4" id="loginPassword" placeholder="••••••••">
                                <i class="bi bi-key"></i>
                            </div>
                        </div>
                        <button class="btn btn-login" id="loginBtn"><i class="bi bi-arrow-right-circle-fill me-2"></i>LOGIN & ACCESS</button>
                        <div class="demo-note mt-3"><i class="bi bi-info-circle-fill"></i> Click Login to enter Dashboard</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script>
        VANTA.NET({
            el: "#bg-vanta",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x3a7bd5,
            backgroundColor: 0x0a0f1c,
            points: 12.0
        });

        // LOGIN BUTTON
        document.getElementById('loginBtn').onclick = function() {
            var email = document.getElementById('loginEmail').value;
            var username = email ? email.split('@')[0] : 'User';
            
            // Set session data
            localStorage.setItem('logged_in', 'true');
            localStorage.setItem('username', username);
            localStorage.setItem('user_email', email || 'user@library.com');
            localStorage.setItem('user_role', 'Librarian');
            
            // Go to dashboard
            window.location.href = 'dashboard.html';
        };
        
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
</body>
</html>
