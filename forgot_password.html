<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Handler - SmartLib</title>
    <!-- No CSS embedded - all styles are external -->
</head>
<body>
    <!-- This page is a functional simulation of forgot_password.php -->
    <!-- The actual password reset form is on the main login page (index.php) -->
    <!-- This script handles the password reset logic when the form is submitted -->
    
    <script>
// ============================================
// FORGOT PASSWORD HANDLER (Replaces forgot_password.php)
// ============================================
// This JavaScript file handles password reset functionality
// It should be included in your HTML page where the forgot password form exists

// Storage keys
const USERS_STORAGE_KEY = 'library_registered_users';
const DEMO_ACCOUNTS = [
    { email: "staff@library.com", password: "staff123", role: "Staff", name: "Staff User", id: "STAFF001" },
    { email: "student@library.com", password: "student123", role: "Student", name: "Student User", id: "STU002" },
    { email: "guest@library.com", password: "guest123", role: "Guest", name: "Guest User", id: "GUEST003" }
];

// CSRF token storage
let csrfToken = null;

/**
 * Generate a new CSRF token
 * @returns {string} Random token
 */
function generateCsrfToken() {
    return 'csrf_' + Date.now() + '_' + Math.random().toString(36).substr(2, 16);
}

/**
 * Initialize CSRF token in sessionStorage
 */
function initCsrfToken() {
    let token = sessionStorage.getItem('csrf_token');
    if (!token) {
        token = generateCsrfToken();
        sessionStorage.setItem('csrf_token', token);
    }
    csrfToken = token;
    return token;
}

/**
 * Validate CSRF token
 * @param {string} submittedToken - Token from form
 * @returns {boolean} True if valid
 */
function validateCsrfToken(submittedToken) {
    const storedToken = sessionStorage.getItem('csrf_token');
    return storedToken && submittedToken === storedToken;
}

/**
 * Load users from localStorage (simulates config/users.json)
 * @returns {Array} Array of user objects
 */
function loadUsers() {
    const usersJson = localStorage.getItem(USERS_STORAGE_KEY);
    if (usersJson) {
        try {
            const users = JSON.parse(usersJson);
            return Array.isArray(users) ? users : [];
        } catch (e) {
            return [];
        }
    }
    return [];
}

/**
 * Save users to localStorage
 * @param {Array} users - Array of user objects
 */
function saveUsers(users) {
    localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(users, null, 2));
}

/**
 * Find user by email (checks both registered users and demo accounts)
 * @param {string} email - Email to search for
 * @returns {object} { found: boolean, user: object|null, index: number|null, isDemo: boolean }
 */
function findUserByEmail(email) {
    const normalizedEmail = email.trim().toLowerCase();
    
    // Check demo accounts first
    const demoIndex = DEMO_ACCOUNTS.findIndex(d => d.email.toLowerCase() === normalizedEmail);
    if (demoIndex !== -1) {
        return { 
            found: true, 
            user: { ...DEMO_ACCOUNTS[demoIndex], isDemo: true },
            index: demoIndex,
            isDemo: true
        };
    }
    
    // Check registered users
    const users = loadUsers();
    const userIndex = users.findIndex(u => u.email && u.email.toLowerCase() === normalizedEmail);
    
    if (userIndex !== -1) {
        return { 
            found: true, 
            user: users[userIndex],
            index: userIndex,
            isDemo: false
        };
    }
    
    return { found: false, user: null, index: null, isDemo: false };
}

/**
 * Hash a password (simulates password_hash with PASSWORD_DEFAULT)
 * Note: This is a simulation. In production, use proper hashing on the backend.
 * For demo purposes, we're using a simple hash + btoa for encoding.
 * @param {string} password - Plain text password
 * @returns {string} Hashed password
 */
function hashPassword(password) {
    // This simulates password_hash() behavior
    // For a real production app, passwords should be hashed on the server
    const salt = 'smartlib_salt_' + Date.now();
    const encoded = btoa(unescape(encodeURIComponent(password + salt)));
    return 'hashed_' + encoded.substring(0, 60);
}

/**
 * Reset password for a user
 * @param {string} email - User's email
 * @param {string} newPassword - New password
 * @returns {object} { success: boolean, error: string|null }
 */
function resetPassword(email, newPassword) {
    // Validate email
    if (!email || email.trim() === '') {
        return { success: false, error: 'email_required', message: 'Email is required' };
    }
    
    // Validate password length
    if (!newPassword || newPassword.length < 8) {
        return { success: false, error: 'short_password', message: 'Password must be at least 8 characters' };
    }
    
    // Find user
    const { found, user, index, isDemo } = findUserByEmail(email);
    
    if (!found) {
        return { success: false, error: 'email_not_found', message: 'Email not found in our records' };
    }
    
    // Cannot reset password for demo accounts (simulate read-only)
    if (isDemo) {
        return { 
            success: false, 
            error: 'demo_account', 
            message: 'Demo account passwords cannot be changed. Please register a new account or use the demo credentials.' 
        };
    }
    
    // Update password for registered user
    const users = loadUsers();
    const hashedPassword = hashPassword(newPassword);
    
    users[index].password = hashedPassword;
    users[index].updated_at = new Date().toISOString().slice(0, 19).replace('T', ' ');
    
    saveUsers(users);
    
    return { success: true, error: null, message: 'Password reset successful!' };
}

/**
 * Handle forgot password form submission
 * @param {Event} event - Form submit event
 */
async function handleForgotPassword(event) {
    event.preventDefault();
    
    // Get form data
    const form = event.target;
    const submittedToken = form.querySelector('[name="csrf_token"]')?.value;
    const email = form.querySelector('[name="email"]')?.value || '';
    const newPassword = form.querySelector('[name="new_password"]')?.value || '';
    const confirmPassword = form.querySelector('[name="confirm_password"]')?.value || '';
    
    // CSRF Protection - Verify token
    if (!validateCsrfToken(submittedToken)) {
        redirectWithError('csrf');
        return;
    }
    
    // Validate passwords match
    if (newPassword !== confirmPassword) {
        redirectWithError('pass_mismatch');
        return;
    }
    
    // Validate password length
    if (newPassword.length < 8) {
        redirectWithError('short_password');
        return;
    }
    
    // Process password reset
    const result = resetPassword(email, newPassword);
    
    if (result.success) {
        // Password reset successful - redirect to login with success message
        redirectWithSuccess();
    } else {
        // Password reset failed - redirect with error
        redirectWithError(result.error);
    }
}

/**
 * Redirect to login page with success parameter
 */
function redirectWithSuccess() {
    // Clear any existing CSRF token to force new one on login page
    sessionStorage.removeItem('csrf_token');
    window.location.href = 'index.html?fp_success=true';
}

/**
 * Redirect to login page with error parameter
 * @param {string} error - Error code
 */
function redirectWithError(error) {
    window.location.href = `index.html?fp_error=${error}`;
}

/**
 * Initialize CSRF token and attach to form
 */
function setupForgotPasswordForm() {
    // Initialize CSRF token
    const token = initCsrfToken();
    
    // Find the forgot password form
    const forgotForm = document.getElementById('forgotPasswordForm') || 
                       document.querySelector('form[action*="forgot"]') ||
                       document.querySelector('#forgot form');
    
    if (forgotForm) {
        // Add or update CSRF token input
        let csrfInput = forgotForm.querySelector('[name="csrf_token"]');
        if (!csrfInput) {
            csrfInput = document.createElement('input');
            csrfInput.type = 'hidden';
            csrfInput.name = 'csrf_token';
            forgotForm.appendChild(csrfInput);
        }
        csrfInput.value = token;
        
        // Attach submit handler if not already attached
        if (!forgotForm.hasAttribute('data-handler-attached')) {
            forgotForm.addEventListener('submit', handleForgotPassword);
            forgotForm.setAttribute('data-handler-attached', 'true');
        }
    }
}

/**
 * Auto-fill due date when borrow date changes (utility function)
 * @param {string} borrowDate - Borrow date in YYYY-MM-DD format
 * @returns {string} Due date (14 days later)
 */
function calculateDueDate(borrowDate) {
    if (!borrowDate) return '';
    const date = new Date(borrowDate);
    date.setDate(date.getDate() + 14);
    return date.toISOString().split('T')[0];
}

/**
 * Attach due date auto-fill to borrow date input
 */
function setupDueDateAutoFill() {
    const borrowDateInput = document.getElementById('borrowDate');
    const dueDateInput = document.getElementById('dueDate');
    
    if (borrowDateInput && dueDateInput) {
        borrowDateInput.addEventListener('change', function() {
            if (!dueDateInput.value) {
                dueDateInput.value = calculateDueDate(this.value);
            }
        });
    }
}

// ============================================
// EXPORTS AND INITIALIZATION
// ============================================

// Auto-initialize when DOM is ready
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
        setupForgotPasswordForm();
        setupDueDateAutoFill();
    });
} else {
    setupForgotPasswordForm();
    setupDueDateAutoFill();
}

// Expose functions globally for use in other scripts
window.ForgotPasswordHandler = {
    resetPassword,
    findUserByEmail,
    validateCsrfToken,
    initCsrfToken,
    hashPassword,
    calculateDueDate,
    DEMO_ACCOUNTS
};

// Console log for debugging
console.log('Forgot Password Handler loaded. Demo accounts (read-only):');
DEMO_ACCOUNTS.forEach(acc => console.log(`  - ${acc.email}`));

// ============================================
// USAGE EXAMPLE
// ============================================
/*
To use this handler in your HTML:

1. Make sure your forgot password form has inputs with these names:
   - input[name="email"]
   - input[name="new_password"] 
   - input[name="confirm_password"]
   - input[name="csrf_token"] (will be auto-added)

2. The form should have id="forgotPasswordForm" OR be inside the forgot tab

3. Example HTML structure:
   <form id="forgotPasswordForm">
       <input type="hidden" name="csrf_token">
       <input type="email" name="email" required>
       <input type="password" name="new_password" required>
       <input type="password" name="confirm_password" required>
       <button type="submit">Reset Password</button>
   </form>

4. The handler will:
   - Auto-add CSRF protection
   - Validate password length (min 8 chars)
   - Check password match
   - Verify email exists (checks both registered users and demo accounts)
   - Update password in localStorage
   - Redirect to index.html with fp_success or fp_error parameter
*/
</script>
</body>
</html>
