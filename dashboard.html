<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SmartLib - Library Management System</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Three.js and Vanta for Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Vanta background container */
        #bg-vanta {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        /* Content overlay */
        .content-overlay {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }
        
        /* Login Card */
        .login-card {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }
        
        .login-card .card-body {
            padding: 2rem;
        }
        
        .login-card h3 {
            color: white;
            font-family: 'Saira Stencil', cursive;
            margin-bottom: 1.5rem;
        }
        
        .login-card .form-label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .login-card .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
            padding: 10px 12px;
        }
        
        .login-card .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .login-card .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #667eea;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.25);
        }
        
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }
        
        .logo-icon-large {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .logo-icon-large i {
            font-size: 4rem;
            color: white;
        }
        
        .logo-section h2 {
            color: white;
            font-family: 'Saira Stencil', cursive;
            font-size: 1.8rem;
        }
        
        .logo-section p {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            padding: 10px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .border-end-custom {
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 280px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .login-card { margin: 20px; max-width: 95%; }
            .login-card .card-body { padding: 1.5rem; }
            .border-end-custom { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px; margin-bottom: 20px; }
            .logo-icon-large { width: 80px; height: 80px; }
            .logo-icon-large i { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
<script>
// Check if user is logged in, if not redirect to login page
if (sessionStorage.getItem('logged_in') !== 'true') {
    window.location.href = 'index.html';
}

// Get user data from sessionStorage
const loggedInUser = {
    name: sessionStorage.getItem('user_name') || 'Guest User',
    email: sessionStorage.getItem('user_email') || 'guest@library.com',
    role: sessionStorage.getItem('user_role') || 'Guest',
    id: sessionStorage.getItem('user_id') || 'GUEST001'
};

// Update all user name elements in your dashboard
document.addEventListener('DOMContentLoaded', function() {
    // Update all elements that display user name
    const userNameElements = ['userName', 'welcomeUserName', 'profileName', 'modalProfileName', 'dropdownUserName', 'displayName'];
    userNameElements.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = loggedInUser.name;
    });
    
    // Update role elements
    const userRoleElements = ['userRole', 'modalProfileRole', 'displayRole'];
    userRoleElements.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            if (id === 'userRole') {
                el.innerHTML = `<i class="bi bi-briefcase"></i> ${loggedInUser.role}`;
            } else {
                el.textContent = loggedInUser.role;
            }
        }
    });
    
    // Update email elements
    const dropdownUserEmail = document.getElementById('dropdownUserEmail');
    if (dropdownUserEmail) dropdownUserEmail.textContent = loggedInUser.email;
    
    const displayEmail = document.getElementById('displayEmail');
    if (displayEmail) displayEmail.textContent = loggedInUser.email;
    
    const profileDetails = document.getElementById('profileDetails');
    if (profileDetails) profileDetails.textContent = `${loggedInUser.role} · ${loggedInUser.email}`;
    
    console.log('Dashboard loaded for user:', loggedInUser.name);
});
</script>

<!-- Vanta.js Background -->
<div id="bg-vanta"></div>

<!-- Toast Notification -->
<div id="toastNotification" class="toast-notification" style="display: none;">
    <div class="toast bg-success text-white" role="alert">
        <div class="toast-body d-flex align-items-center justify-content-between">
            <span id="toastMessage"><i class="bi bi-check-circle-fill me-2"></i> Message</span>
            <button type="button" class="btn-close btn-close-white" onclick="hideToast()"></button>
        </div>
    </div>
</div>

<!-- LOGIN SECTION -->
<div id="loginSection" class="content-overlay d-flex justify-content-center align-items-center vh-100">
    <div class="card login-card">
        <div class="card-body">
            <h3 class="text-center">LOGIN</h3>
            <div class="row">
                <div class="col-md-6 border-end-custom">
                    <div class="logo-section">
                        <div class="logo-icon-large">
                            <i class="bi bi-book-half"></i>
                        </div>
                        <h2>SmartLib</h2>
                        <p>Library Management System</p>
                        <div class="mt-3">
                            <small><i class="bi bi-shield-check"></i> Secure Access</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-envelope"></i> Email Address</label>
                            <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                            <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label small text-white-50">Remember Me</label>
                            </div>
                            <a href="#" class="text-decoration-none small" style="color: #a78bfa;" onclick="showForgotPassword()">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn-login">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <small class="text-white-50">
                            Don't have an account? 
                            <a href="#" class="text-decoration-none" style="color: #a78bfa;" onclick="showRegister()">Register here</a>
                        </small>
                    </div>
                    <hr class="my-3" style="border-color: rgba(255,255,255,0.2);">
                    <div class="text-center">
                        <small class="text-white-50"><i class="bi bi-shield-check"></i> Secure Login • 30min Session</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Register Modal -->
<div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background: rgba(15, 25, 45, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);">
            <div class="modal-header" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                <h5 class="modal-title text-white"><i class="bi bi-person-plus"></i> Create Account</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="mb-3"><label class="form-label text-white">Full Name</label><input type="text" id="regName" class="form-control" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;" required></div>
                    <div class="mb-3"><label class="form-label text-white">Email Address</label><input type="email" id="regEmail" class="form-control" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;" required><small id="regEmailAvailability" class="text-muted"></small></div>
                    <div class="mb-3"><label class="form-label text-white">Password</label><input type="password" id="regPassword" class="form-control" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;" required><div id="regPasswordStrength"></div></div>
                    <div class="mb-3"><label class="form-label text-white">Confirm Password</label><input type="password" id="regConfirm" class="form-control" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;" required><small id="regPasswordMatch" class="text-muted"></small></div>
                    <div class="mb-3"><label class="form-label text-white">Role</label><select id="regRole" class="form-select" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;"><option value="Student">🎓 Student</option><option value="Staff">👔 Staff</option><option value="Guest">🌐 Guest</option></select></div>
                    <div class="form-check mb-3"><input type="checkbox" class="form-check-input" id="termsCheck"><label class="form-check-label text-white-50 small">I agree to the Terms & Conditions</label></div>
                    <button type="submit" class="btn btn-success w-100" style="background: linear-gradient(135deg, #11998e, #38ef7d); border: none;">Register</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal fade" id="forgotModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background: rgba(15, 25, 45, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);">
            <div class="modal-header" style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                <h5 class="modal-title text-white"><i class="bi bi-key"></i> Reset Password</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="forgotForm">
                    <div class="alert alert-info small py-2 mb-3" style="background: rgba(102,126,234,0.2); border: 1px solid rgba(102,126,234,0.3); color: white;"><i class="bi bi-info-circle-fill"></i> Enter your registered email</div>
                    <div class="mb-3"><label class="form-label text-white">Email Address</label><input type="email" id="fpEmail" class="form-control" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;" required></div>
                    <div class="mb-3"><label class="form-label text-white">New Password</label><input type="password" id="fpNewPassword" class="form-control" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;" required><div id="fpPasswordStrength"></div></div>
                    <div class="mb-3"><label class="form-label text-white">Confirm Password</label><input type="password" id="fpConfirm" class="form-control" style="background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: white;" required><small id="fpPasswordMatch" class="text-muted"></small></div>
                    <button type="submit" class="btn btn-warning w-100" style="background: linear-gradient(135deg, #f093fb, #f5576c); border: none; color: white;">Reset Password</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Initialize Vanta.js Background
VANTA.NET({
    el: "#bg-vanta",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    minHeight: 200.00,
    minWidth: 200.00,
    scale: 1.00,
    scaleMobile: 1.00,
    color: 0x667eea,
    backgroundColor: 0x0a0a2a
});

// Demo accounts
const demoAccounts = [
    { id: "STAFF001", fullname: "Staff User", email: "staff@library.com", password: "staff123", role: "Staff" },
    { id: "STU002", fullname: "Student User", email: "student@library.com", password: "student123", role: "Student" },
    { id: "GUEST003", fullname: "Guest User", email: "guest@library.com", password: "guest123", role: "Guest" }
];

let registeredUsers = JSON.parse(localStorage.getItem('library_users') || '[]');

function saveUsers() { localStorage.setItem('library_users', JSON.stringify(registeredUsers)); }
function userExists(email) { return demoAccounts.some(u => u.email === email) || registeredUsers.some(u => u.email === email); }
function authenticateUser(email, password) {
    const demoUser = demoAccounts.find(u => u.email === email && u.password === password);
    if (demoUser) return demoUser;
    return registeredUsers.find(u => u.email === email && u.password === password) || null;
}

function checkPasswordStrength(password) {
    let strength = 0;
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
    if (password.match(/\d/)) strength++;
    if (password.match(/[^a-zA-Z\d]/)) strength++;
    return strength;
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toastNotification');
    const toastMessage = document.getElementById('toastMessage');
    const toastDiv = toast.querySelector('.toast');
    toastDiv.className = `toast text-white bg-${type === 'success' ? 'success' : type === 'error' ? 'danger' : 'info'}`;
    toastMessage.innerHTML = `<i class="bi bi-${type === 'success' ? 'check-circle-fill' : 'exclamation-triangle-fill'} me-2"></i> ${message}`;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
}

function hideToast() { document.getElementById('toastNotification').style.display = 'none'; }

function showRegister() { new bootstrap.Modal(document.getElementById('registerModal')).show(); }
function showForgotPassword() { new bootstrap.Modal(document.getElementById('forgotModal')).show(); }

// LOGIN HANDLER - Redirects to dashboard.html
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const remember = document.getElementById('rememberMe').checked;
    const user = authenticateUser(email, password);
    
    if (user) {
        // Store user data in sessionStorage
        sessionStorage.setItem('logged_in', 'true');
        sessionStorage.setItem('user_name', user.fullname);
        sessionStorage.setItem('user_email', user.email);
        sessionStorage.setItem('user_role', user.role);
        sessionStorage.setItem('user_id', user.id);
        
        // Store remember me
        if (remember) {
            localStorage.setItem('remembered_email', email);
        } else {
            localStorage.removeItem('remembered_email');
        }
        
        showToast(`Welcome ${user.fullname}! Redirecting to dashboard...`, 'success');
        
        // Redirect to dashboard.html after a short delay
        setTimeout(function() {
            window.location.href = 'dashboard.html';
        }, 1000);
    } else {
        showToast('Invalid email or password!', 'error');
    }
});

// Register handler
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const role = document.getElementById('regRole').value;
    const terms = document.getElementById('termsCheck').checked;
    
    if (!terms) { showToast('Please accept Terms & Conditions!', 'error'); return; }
    if (userExists(email)) { showToast('Email already registered!', 'error'); return; }
    
    const newUser = { 
        id: 'USER' + Date.now(), 
        fullname: name, 
        email: email, 
        password: password, 
        role: role, 
        registeredDate: new Date().toISOString() 
    };
    registeredUsers.push(newUser);
    saveUsers();
    showToast('Registration successful! Please login.', 'success');
    bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
    document.getElementById('loginEmail').value = email;
    document.getElementById('registerForm').reset();
});

// Forgot password handler
document.getElementById('forgotForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('fpEmail').value;
    const newPassword = document.getElementById('fpNewPassword').value;
    const confirm = document.getElementById('fpConfirm').value;
    if (newPassword !== confirm) { showToast('Passwords do not match!', 'error'); return; }
    
    let found = false;
    for (let i = 0; i < registeredUsers.length; i++) {
        if (registeredUsers[i].email === email) {
            registeredUsers[i].password = newPassword;
            saveUsers();
            found = true;
            break;
        }
    }
    
    if (found) {
        showToast('Password reset successful! Please login.', 'success');
        bootstrap.Modal.getInstance(document.getElementById('forgotModal')).hide();
        document.getElementById('loginEmail').value = email;
    } else if (demoAccounts.some(u => u.email === email)) {
        showToast('Demo account password cannot be changed!', 'error');
    } else {
        showToast('Email not found! Please register first.', 'error');
    }
});

// Password strength for registration
document.getElementById('regPassword')?.addEventListener('input', function() {
    const pwd = this.value;
    const strengthDiv = document.getElementById('regPasswordStrength');
    if (!pwd) { strengthDiv.innerHTML = ''; return; }
    const strength = checkPasswordStrength(pwd);
    const width = strength <= 1 ? '33%' : strength === 2 ? '66%' : '100%';
    const color = strength <= 1 ? '#ef4444' : strength === 2 ? '#f59e0b' : '#10b981';
    const text = strength <= 1 ? 'Weak' : strength === 2 ? 'Medium' : 'Strong';
    strengthDiv.innerHTML = `<div style="height:4px; border-radius:2px; margin-top:5px; width:${width}; background:${color};"></div><small class="text-${strength <= 1 ? 'danger' : strength === 2 ? 'warning' : 'success'}">${text}</small>`;
    checkRegPasswordMatch();
});

function checkRegPasswordMatch() {
    const pwd = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;
    const matchSpan = document.getElementById('regPasswordMatch');
    if (!confirm) { matchSpan.innerHTML = ''; return; }
    matchSpan.innerHTML = pwd === confirm ? '<span class="text-success">✓ Passwords match</span>' : '<span class="text-danger">✗ Passwords do not match</span>';
}

document.getElementById('regConfirm')?.addEventListener('input', checkRegPasswordMatch);
document.getElementById('regEmail')?.addEventListener('input', function() {
    const email = this.value;
    const availabilitySpan = document.getElementById('regEmailAvailability');
    if (userExists(email)) availabilitySpan.innerHTML = '<span class="text-danger">✗ Email already taken</span>';
    else if (email.includes('@')) availabilitySpan.innerHTML = '<span class="text-success">✓ Available</span>';
    else availabilitySpan.innerHTML = '';
});

// Check for remembered email
const rememberedEmail = localStorage.getItem('remembered_email');
if (rememberedEmail) {
    document.getElementById('loginEmail').value = rememberedEmail;
    document.getElementById('rememberMe').checked = true;
}

// Check if already logged in - redirect to dashboard
if (sessionStorage.getItem('logged_in') === 'true') {
    window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
